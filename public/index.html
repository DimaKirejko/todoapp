<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDoApp</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #dcdcdc;
      --panel: #ffffff;
      --muted: #bdbdbd;
      --muted-dark: #8a8a8a;
      --text: #111111;
      --primary: #4f6bed;
      --primary-hover: #3f59d4;
      --success: #09b95c;
      --warning: #f1cf4d;
      --danger: #ff5a52;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --stat-blue: #4f6bed;
      --stat-green: #08bd63;
      --stat-orange: #ff6a00;
      --stat-purple: #7c4de8;
      --line: #c3c3c3;
      --card-bg: rgba(255, 255, 255, 0.65);
      --avatar-green: #08bd63;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #efefef;
      padding: 36px 28px;
      border-right: 1px solid #cfcfcf;
    }

    .logo {
      font-size: 78px;
      font-weight: 700;
      margin: 10px 0 90px;
      line-height: 0.95;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .nav-button {
      border: none;
      background: transparent;
      color: #111;
      font-size: 26px;
      font-weight: 700;
      text-align: left;
      padding: 0;
      cursor: pointer;
      opacity: 0.85;
    }

    .nav-button.active {
      opacity: 1;
    }

    .main {
      padding: 36px 44px 48px;
    }

    .page { display: none; }
    .page.active { display: block; }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .page-title {
      margin: 0;
      font-size: 52px;
      font-weight: 700;
    }

    .primary-button,
    .secondary-button,
    .danger-button {
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      font-family: Arial, sans-serif;
    }

    .primary-button {
      background: var(--primary);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .primary-button:hover { background: var(--primary-hover); }

    .secondary-button {
      background: #c7c7c7;
      color: #111;
    }

    .danger-button {
      background: var(--danger);
      color: #fff;
    }

    .toolbar,
    .message-bar,
    .task-card,
    .modal-card,
    .stats-toolbar,
    .users-toolbar,
    .user-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: none;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.6fr 180px 160px auto;
      gap: 18px;
      align-items: end;
      padding: 22px 26px;
      margin-bottom: 28px;
    }

    .stats-toolbar {
      display: grid;
      grid-template-columns: 1.6fr 180px 180px auto;
      gap: 18px;
      align-items: end;
      padding: 22px 26px;
      margin-bottom: 30px;
    }

    .users-toolbar {
      display: grid;
      grid-template-columns: 180px 160px;
      gap: 18px;
      align-items: end;
      padding: 22px 26px;
      margin-bottom: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
      color: #666;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: none;
      border-radius: var(--radius-md);
      background: #c9c9c9;
      padding: 14px 16px;
      font-size: 16px;
      color: #111;
      font-family: Arial, sans-serif;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .message-bar {
      padding: 14px 18px;
      margin-bottom: 18px;
      font-size: 15px;
      font-weight: 700;
      display: none;
    }

    .message-bar.show { display: block; }
    .message-bar.success { background: rgba(9, 185, 92, 0.15); color: #066937; }
    .message-bar.error { background: rgba(217, 75, 75, 0.15); color: #892727; }
    .message-bar.info { background: rgba(79, 107, 237, 0.14); color: #2d48b0; }

    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .task-card {
      padding: 22px 26px 18px;
    }

    .task-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
    }

    .task-main {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      min-width: 0;
      flex: 1;
    }

    .task-status-dot {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #000;
      position: relative;
      margin-top: 2px;
    }

    .task-status-dot::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: var(--warning);
    }

    .task-status-dot.done::after {
      background: var(--success);
    }

    .task-content {
      min-width: 0;
      flex: 1;
    }

    .task-title {
      margin: 0 0 6px;
      font-size: 28px;
      font-weight: 700;
      word-break: break-word;
    }

    .task-description {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #222;
      word-break: break-word;
    }

    .task-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      padding-left: 74px;
    }

    .chip {
      border-radius: 999px;
      padding: 7px 16px;
      background: #a9a9a9;
      color: #111;
      font-size: 13px;
      min-width: 128px;
      text-align: center;
    }

    .chip.status-progress {
      background: var(--warning);
      font-weight: 700;
    }

    .chip.status-done {
      background: var(--success);
      font-weight: 700;
      color: #fff;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 34px;
      align-items: stretch;
    }

    .stat-card {
      min-height: 202px;
      background: transparent;
      border: 2px solid currentColor;
      border-radius: 42px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .stat-card.blue { color: var(--stat-blue); }
    .stat-card.green { color: var(--stat-green); }
    .stat-card.orange { color: var(--stat-orange); }
    .stat-card.purple { color: var(--stat-purple); }

    .stat-label {
      font-size: 20px;
      line-height: 1.25;
      color: #6d6d6d;
      margin-bottom: 28px;
      max-width: 100%;
    }

    .stat-value {
      font-size: 44px;
      font-weight: 700;
      color: currentColor;
      line-height: 1;
      word-break: break-word;
    }

    .users-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 24px;
    }

    .user-card {
      padding: 14px 16px 18px;
      min-height: 272px;
      display: flex;
      flex-direction: column;
    }

    .user-avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .user-avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: var(--avatar-green);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      font-size: 20px;
      line-height: 1;
      overflow: hidden;
      font-weight: 400;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .user-name {
      font-size: 16px;
      text-align: center;
      margin: 0 0 8px;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-phone {
      color: #9a9a9a;
      font-size: 16px;
      text-align: center;
      margin: 0 0 16px;
      min-height: 22px;
    }

    .user-id-chip {
      align-self: center;
      border-radius: 999px;
      background: #d0d0d0;
      padding: 8px 18px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    .user-divider {
      height: 1px;
      background: var(--line);
      margin-bottom: 14px;
    }

    .user-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: auto;
    }

    .user-button {
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      min-width: 86px;
    }

    .user-button.edit {
      background: #c9c9c9;
      color: #111;
    }

    .user-button.delete {
      background: var(--danger);
      color: #111;
    }

    .empty-state {
      padding: 28px;
      font-size: 18px;
      font-weight: 700;
      color: #5f5f5f;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.28);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 999;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: min(680px, 100%);
      background: #efefef;
      padding: 24px;
      border-radius: 24px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .modal-title {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
    }

    .icon-button {
      border: none;
      background: transparent;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .small-button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .small-button.edit { background: #c7c7c7; }
    .small-button.delete { background: rgba(217, 75, 75, 0.95); color: #fff; }
    .small-button.toggle.progress { background: var(--warning); }
    .small-button.toggle.done { background: var(--success); color: #fff; }

    @media (max-width: 1200px) {
      .stats-grid {
        grid-template-columns: repeat(2, minmax(180px, 1fr));
      }

      .users-grid {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid #cfcfcf;
      }

      .logo {
        margin-bottom: 28px;
        font-size: 54px;
      }

      .nav {
        flex-direction: row;
        gap: 24px;
      }

      .toolbar,
      .stats-toolbar {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      .main {
        padding: 20px;
      }

      .page-header {
        flex-direction: column;
        align-items: stretch;
      }

      .page-title {
        font-size: 38px;
      }

      .toolbar,
      .stats-toolbar,
      .users-toolbar {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .task-top {
        flex-direction: column;
      }

      .chip-row {
        padding-left: 0;
      }

      .task-main {
        align-items: center;
      }

      .stats-grid,
      .users-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">Todoapp</div>
      <nav class="nav">
        <button class="nav-button active" data-page="tasks-page">Tasks</button>
        <button class="nav-button" data-page="users-page">Users</button>
        <button class="nav-button" data-page="statistics-page">Stat</button>
      </nav>
    </aside>

    <main class="main">
      <div id="messageBar" class="message-bar"></div>

      <section id="tasks-page" class="page active">
        <div class="page-header">
          <h1 class="page-title">Tasks</h1>
          <button id="openCreateTaskModalButton" class="primary-button">+ New task</button>
        </div>

        <div class="toolbar">
          <div class="field">
            <label for="taskUserFilter">Users</label>
            <select id="taskUserFilter">
              <option value="">All users</option>
            </select>
          </div>
          <div class="field">
            <label for="taskLimitFilter">On page</label>
            <select id="taskLimitFilter">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
            </select>
          </div>
          <div class="field">
            <label for="taskOffsetFilter">Offset</label>
            <input id="taskOffsetFilter" type="number" min="0" step="1" value="0" />
          </div>
          <button id="applyTaskFiltersButton" class="secondary-button">Apply</button>
        </div>

        <div id="tasksList" class="tasks-list"></div>
      </section>

      <section id="users-page" class="page">
        <div class="page-header">
          <h1 class="page-title">Users</h1>
          <button id="openCreateUserModalButton" class="primary-button">+ Add new user</button>
        </div>

        <div class="users-toolbar">
          <div class="field">
            <label for="usersLimitFilter">Pages</label>
            <select id="usersLimitFilter">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
            </select>
          </div>
          <div class="field">
            <label for="usersOffsetFilter">Offset</label>
            <input id="usersOffsetFilter" type="number" min="0" step="1" value="0" />
          </div>
        </div>

        <div id="usersList" class="users-grid"></div>
      </section>

      <section id="statistics-page" class="page">
        <div class="page-header">
          <h1 class="page-title">Statistics</h1>
        </div>

        <div class="stats-toolbar">
          <div class="field">
            <label for="statisticsUserFilter">Users</label>
            <select id="statisticsUserFilter">
              <option value="">All users</option>
            </select>
          </div>
          <div class="field">
            <label for="statisticsFromInput">From</label>
            <input id="statisticsFromInput" type="date" />
          </div>
          <div class="field">
            <label for="statisticsToInput">To</label>
            <input id="statisticsToInput" type="date" />
          </div>
          <button id="applyStatisticsFiltersButton" class="primary-button">Apply</button>
        </div>

        <div class="stats-grid">
          <div class="stat-card blue">
            <div class="stat-label">Tasks created</div>
            <div id="statTasksCreated" class="stat-value">—</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">Completed tasks</div>
            <div id="statTasksCompleted" class="stat-value">—</div>
          </div>
          <div class="stat-card orange">
            <div class="stat-label">Completion percentage</div>
            <div id="statCompletionRate" class="stat-value">—</div>
          </div>
          <div class="stat-card purple">
            <div class="stat-label">Average execution time</div>
            <div id="statAverageTime" class="stat-value">—</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="taskModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="taskModalTitle" class="modal-title">New task</h2>
        <button id="closeTaskModalButton" class="icon-button">×</button>
      </div>

      <form id="taskForm" class="form-grid">
        <div class="field">
          <label for="taskTitleInput">Title</label>
          <input id="taskTitleInput" name="title" type="text" maxlength="100" required />
        </div>

        <div class="field">
          <label for="taskDescriptionInput">Description</label>
          <textarea id="taskDescriptionInput" name="description" maxlength="1000"></textarea>
        </div>

        <div class="field">
          <label for="taskAuthorSelect">User</label>
          <select id="taskAuthorSelect" name="author_user_id" required>
            <option value="">Select user</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="button" id="cancelTaskModalButton" class="secondary-button">Cancel</button>
          <button type="submit" id="submitTaskButton" class="primary-button">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="userModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="userModalTitle" class="modal-title">New user</h2>
        <button id="closeUserModalButton" class="icon-button">×</button>
      </div>

      <form id="userForm" class="form-grid">
        <div class="field">
          <label for="userFullNameInput">Full name</label>
          <input id="userFullNameInput" name="full_name" type="text" maxlength="100" required />
        </div>

        <div class="field">
          <label for="userPhoneInput">Phone number</label>
          <input id="userPhoneInput" name="phone_number" type="text" maxlength="15" />
        </div>

        <div class="form-actions">
          <button type="button" id="cancelUserModalButton" class="secondary-button">Cancel</button>
          <button type="submit" id="submitUserButton" class="primary-button">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://127.0.0.1:5050/api/v1';
    const USER_IMAGE_CANDIDATE_EXTENSIONS = ['png', 'jpg', 'jpeg', 'webp'];

    const state = {
      users: [],
      tasks: [],
      statistics: {
        tasks_created: null,
        tasks_completed: null,
        tasks_completed_rate: null,
        tasks_average_completion_time: null,
      },
      taskFilters: {
        userId: '',
        limit: 20,
        offset: 0,
      },
      usersFilters: {
        limit: 20,
        offset: 0,
      },
      statisticsFilters: {
        userId: '',
        from: '',
        to: '',
      },
      taskModalMode: 'create',
      editingTaskId: null,
      userModalMode: 'create',
      editingUserId: null,
    };

    const elements = {
      messageBar: document.getElementById('messageBar'),
      navButtons: [...document.querySelectorAll('.nav-button')],
      pages: [...document.querySelectorAll('.page')],
      tasksList: document.getElementById('tasksList'),
      taskUserFilter: document.getElementById('taskUserFilter'),
      taskLimitFilter: document.getElementById('taskLimitFilter'),
      taskOffsetFilter: document.getElementById('taskOffsetFilter'),
      applyTaskFiltersButton: document.getElementById('applyTaskFiltersButton'),
      openCreateTaskModalButton: document.getElementById('openCreateTaskModalButton'),
      taskModal: document.getElementById('taskModal'),
      taskModalTitle: document.getElementById('taskModalTitle'),
      closeTaskModalButton: document.getElementById('closeTaskModalButton'),
      cancelTaskModalButton: document.getElementById('cancelTaskModalButton'),
      taskForm: document.getElementById('taskForm'),
      taskTitleInput: document.getElementById('taskTitleInput'),
      taskDescriptionInput: document.getElementById('taskDescriptionInput'),
      taskAuthorSelect: document.getElementById('taskAuthorSelect'),
      submitTaskButton: document.getElementById('submitTaskButton'),
      usersList: document.getElementById('usersList'),
      usersLimitFilter: document.getElementById('usersLimitFilter'),
      usersOffsetFilter: document.getElementById('usersOffsetFilter'),
      openCreateUserModalButton: document.getElementById('openCreateUserModalButton'),
      userModal: document.getElementById('userModal'),
      userModalTitle: document.getElementById('userModalTitle'),
      closeUserModalButton: document.getElementById('closeUserModalButton'),
      cancelUserModalButton: document.getElementById('cancelUserModalButton'),
      userForm: document.getElementById('userForm'),
      userFullNameInput: document.getElementById('userFullNameInput'),
      userPhoneInput: document.getElementById('userPhoneInput'),
      submitUserButton: document.getElementById('submitUserButton'),
      statisticsUserFilter: document.getElementById('statisticsUserFilter'),
      statisticsFromInput: document.getElementById('statisticsFromInput'),
      statisticsToInput: document.getElementById('statisticsToInput'),
      applyStatisticsFiltersButton: document.getElementById('applyStatisticsFiltersButton'),
      statTasksCreated: document.getElementById('statTasksCreated'),
      statTasksCompleted: document.getElementById('statTasksCompleted'),
      statCompletionRate: document.getElementById('statCompletionRate'),
      statAverageTime: document.getElementById('statAverageTime'),
    };

    function showMessage(text, type = 'info') {
      elements.messageBar.textContent = text;
      elements.messageBar.className = `message-bar show ${type}`;
    }

    function clearMessage() {
      elements.messageBar.textContent = '';
      elements.messageBar.className = 'message-bar';
    }

    function getErrorText(error) {
      if (error && typeof error === 'object') {
        return error.message || error.error || JSON.stringify(error);
      }
      return String(error || 'Unknown error');
    }

    async function request(path, options = {}) {
      const response = await fetch(`${API_BASE_URL}${path}`, {
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        },
        ...options,
      });

      if (response.status === 204) {
        return null;
      }

      const text = await response.text();
      const data = text ? safeJsonParse(text) : null;

      if (!response.ok) {
        throw data || { message: `Request failed with status ${response.status}` };
      }

      return data;
    }

    function safeJsonParse(text) {
      try {
        return JSON.parse(text);
      } catch (_) {
        return { message: text };
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeNullableString(value) {
      if (value === null || value === undefined) return '';
      if (String(value).trim().toLowerCase() === 'null') return '';
      return String(value);
    }

    function formatDate(value) {
      if (!value || String(value).toLowerCase() === 'null') return '—';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('uk-UA', {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
      }).format(date);
    }

    function formatDurationFromCreatedAt(createdAt) {
      const created = new Date(createdAt);
      if (Number.isNaN(created.getTime())) return '—';
      const diffMs = Date.now() - created.getTime();
      if (diffMs < 0) return '0m';

      const totalMinutes = Math.floor(diffMs / 60000);
      const days = Math.floor(totalMinutes / (60 * 24));
      const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
      const minutes = totalMinutes % 60;

      if (days > 0) return `${days}d ${hours}h`;
      if (hours > 0) return `${hours}h ${minutes}m`;
      return `${minutes}m`;
    }

    function formatStatisticsRate(value) {
      if (value === null || value === undefined || value === '') return '—';
      const number = Number(value);
      if (Number.isNaN(number)) return String(value);
      return `${number.toFixed(2)}%`;
    }

    function getUserNameById(userId) {
      const user = state.users.find(item => Number(item.id) === Number(userId));
      return user ? user.full_name : `User ID: ${userId}`;
    }

    function getUserInitials(fullName) {
      const normalized = normalizeNullableString(fullName).trim();
      if (!normalized) return '??';
      const letters = normalized.replace(/\s+/g, '');
      return letters.slice(0, 2).toUpperCase();
    }

    function getUserImageMarkup(user) {
      const initials = getUserInitials(user.full_name);
      const imgBaseName = String(user.id);
      const sources = USER_IMAGE_CANDIDATE_EXTENSIONS.map(ext => `img/${imgBaseName}.${ext}`);
      const fallbackText = escapeHtml(initials);

      return `
        <div class="user-avatar" data-avatar data-fallback="${fallbackText}" data-sources="${escapeHtml(JSON.stringify(sources))}">${fallbackText}</div>
      `;
    }

    function populateUserSelects() {
      const allUsersOptions = ['<option value="">All users</option>']
        .concat(state.users.map(user => `<option value="${user.id}">${escapeHtml(user.full_name)}</option>`))
        .join('');

      elements.taskUserFilter.innerHTML = allUsersOptions;
      elements.taskUserFilter.value = state.taskFilters.userId;

      elements.statisticsUserFilter.innerHTML = allUsersOptions;
      elements.statisticsUserFilter.value = state.statisticsFilters.userId;

      const authorOptions = ['<option value="">Select user</option>']
        .concat(state.users.map(user => `<option value="${user.id}">${escapeHtml(user.full_name)}</option>`))
        .join('');

      elements.taskAuthorSelect.innerHTML = authorOptions;
    }

    function renderTasks() {
      if (!state.tasks.length) {
        elements.tasksList.innerHTML = '<div class="empty-state">Задачі не знайдено.</div>';
        return;
      }

      elements.tasksList.innerHTML = state.tasks.map(task => {
        const isDone = Boolean(task.completed);
        const authorName = getUserNameById(task.author_user_id);
        const description = normalizeNullableString(task.description) || 'No description';
        const timeInProgress = formatDurationFromCreatedAt(task.created_at);

        return `
          <article class="task-card">
            <div class="task-top">
              <div class="task-main">
                <div class="task-status-dot ${isDone ? 'done' : ''}"></div>
                <div class="task-content">
                  <h3 class="task-title">${escapeHtml(task.title)}</h3>
                  <p class="task-description">${escapeHtml(description)}</p>
                </div>
              </div>

              <div class="task-actions">
                <button class="small-button toggle ${isDone ? 'done' : 'progress'}" data-action="toggle" data-id="${task.id}">
                  ${isDone ? 'Mark in progress' : 'Mark done'}
                </button>
                <button class="small-button edit" data-action="edit" data-id="${task.id}">Edit</button>
                <button class="small-button delete" data-action="delete" data-id="${task.id}">Delete</button>
              </div>
            </div>

            <div class="chip-row">
              <div class="chip">${escapeHtml(authorName)}</div>
              <div class="chip">${escapeHtml(formatDate(task.created_at))}</div>
              <div class="chip ${isDone ? 'status-done' : 'status-progress'}">${isDone ? 'Done' : 'In progress'}</div>
              <div class="chip">${escapeHtml(timeInProgress)}</div>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderUsers() {
      if (!state.users.length) {
        elements.usersList.innerHTML = '<div class="empty-state">Користувачів не знайдено.</div>';
        return;
      }

      elements.usersList.innerHTML = state.users.map(user => {
        const phoneNumber = normalizeNullableString(user.phone_number) || 'No phone number';
        return `
          <article class="user-card">
            <div class="user-avatar-wrap">
              ${getUserImageMarkup(user)}
            </div>
            <h3 class="user-name">${escapeHtml(user.full_name)}</h3>
            <p class="user-phone">${escapeHtml(phoneNumber)}</p>
            <div class="user-id-chip">ID:${escapeHtml(user.id)}</div>
            <div class="user-divider"></div>
            <div class="user-actions">
              <button class="user-button edit" data-user-action="edit" data-id="${user.id}">Edit</button>
              <button class="user-button delete" data-user-action="delete" data-id="${user.id}">Delete</button>
            </div>
          </article>
        `;
      }).join('');

      hydrateUserAvatars();
    }

    function renderStatistics() {
      const stats = state.statistics || {};
      elements.statTasksCreated.textContent = stats.tasks_created ?? '—';
      elements.statTasksCompleted.textContent = stats.tasks_completed ?? '—';
      elements.statCompletionRate.textContent = formatStatisticsRate(stats.tasks_completed_rate);
      elements.statAverageTime.textContent = normalizeNullableString(stats.tasks_average_completion_time) || '—';
    }

    function hydrateUserAvatars() {
      const avatarNodes = document.querySelectorAll('[data-avatar]');
      avatarNodes.forEach(node => {
        const rawSources = node.dataset.sources;
        if (!rawSources) return;

        let sources = [];
        try {
          sources = JSON.parse(rawSources);
        } catch (_) {
          sources = [];
        }

        if (!Array.isArray(sources) || !sources.length) return;
        tryNextUserImage(node, sources, 0);
      });
    }

    function tryNextUserImage(node, sources, index) {
      if (index >= sources.length) {
        node.textContent = node.dataset.fallback || '??';
        return;
      }

      const img = new Image();
      img.onload = () => {
        node.innerHTML = '';
        node.appendChild(img);
      };
      img.onerror = () => {
        tryNextUserImage(node, sources, index + 1);
      };
      img.src = sources[index];
      img.alt = 'User avatar';
    }

    function buildUsersQuery() {
      const params = new URLSearchParams();
      if (state.usersFilters.limit !== '' && state.usersFilters.limit !== null) params.set('limit', state.usersFilters.limit);
      if (state.usersFilters.offset !== '' && state.usersFilters.offset !== null) params.set('offset', state.usersFilters.offset);
      return params.toString() ? `?${params.toString()}` : '';
    }

    async function loadUsers(options = {}) {
      const { silent = false } = options;
      if (!silent) showMessage('Loading users...', 'info');
      const users = await request(`/users${buildUsersQuery()}`);
      state.users = Array.isArray(users) ? users : [];
      populateUserSelects();
      renderUsers();
      if (!silent) clearMessage();
    }

    function buildTasksQuery() {
      const params = new URLSearchParams();
      if (state.taskFilters.userId) params.set('user_id', state.taskFilters.userId);
      if (state.taskFilters.limit !== '' && state.taskFilters.limit !== null) params.set('limit', state.taskFilters.limit);
      if (state.taskFilters.offset !== '' && state.taskFilters.offset !== null) params.set('offset', state.taskFilters.offset);
      return params.toString() ? `?${params.toString()}` : '';
    }

    function buildStatisticsQuery() {
      const params = new URLSearchParams();
      if (state.statisticsFilters.userId) params.set('user_id', state.statisticsFilters.userId);
      if (state.statisticsFilters.from) params.set('from', state.statisticsFilters.from);
      if (state.statisticsFilters.to) params.set('to', state.statisticsFilters.to);
      return params.toString() ? `?${params.toString()}` : '';
    }

    async function loadTasks() {
      showMessage('Loading tasks...', 'info');
      const tasks = await request(`/tasks${buildTasksQuery()}`);
      state.tasks = Array.isArray(tasks) ? tasks : [];
      renderTasks();
      clearMessage();
    }

    async function loadStatistics() {
      showMessage('Loading statistics...', 'info');
      const statistics = await request(`/statistics${buildStatisticsQuery()}`);
      state.statistics = statistics || {};
      renderStatistics();
      clearMessage();
    }

    function openCreateTaskModal() {
      state.taskModalMode = 'create';
      state.editingTaskId = null;
      elements.taskModalTitle.textContent = 'New task';
      elements.submitTaskButton.textContent = 'Create';
      elements.taskForm.reset();
      elements.taskAuthorSelect.value = '';
      elements.taskModal.classList.add('show');
      elements.taskTitleInput.focus();
    }

    function openEditTaskModal(taskId) {
      const task = state.tasks.find(item => Number(item.id) === Number(taskId));
      if (!task) {
        showMessage('Не вдалося знайти задачу для редагування.', 'error');
        return;
      }

      state.taskModalMode = 'edit';
      state.editingTaskId = Number(taskId);
      elements.taskModalTitle.textContent = 'Edit task';
      elements.submitTaskButton.textContent = 'Save changes';
      elements.taskTitleInput.value = normalizeNullableString(task.title);
      elements.taskDescriptionInput.value = normalizeNullableString(task.description);
      elements.taskAuthorSelect.value = String(task.author_user_id ?? '');
      elements.taskModal.classList.add('show');
      elements.taskTitleInput.focus();
    }

    function closeTaskModal() {
      elements.taskModal.classList.remove('show');
    }

    function openCreateUserModal() {
      state.userModalMode = 'create';
      state.editingUserId = null;
      elements.userModalTitle.textContent = 'New user';
      elements.submitUserButton.textContent = 'Create';
      elements.userForm.reset();
      elements.userModal.classList.add('show');
      elements.userFullNameInput.focus();
    }

    function openEditUserModal(userId) {
      const user = state.users.find(item => Number(item.id) === Number(userId));
      if (!user) {
        showMessage('Не вдалося знайти користувача для редагування.', 'error');
        return;
      }

      state.userModalMode = 'edit';
      state.editingUserId = Number(userId);
      elements.userModalTitle.textContent = 'Edit user';
      elements.submitUserButton.textContent = 'Save changes';
      elements.userFullNameInput.value = normalizeNullableString(user.full_name);
      elements.userPhoneInput.value = normalizeNullableString(user.phone_number);
      elements.userModal.classList.add('show');
      elements.userFullNameInput.focus();
    }

    function closeUserModal() {
      elements.userModal.classList.remove('show');
    }

    async function createTask(payload) {
      await request('/tasks', {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      showMessage('Задачу створено.', 'success');
    }

    async function updateTask(taskId, payload) {
      await request(`/tasks/${taskId}`, {
        method: 'PATCH',
        body: JSON.stringify(payload),
      });
      showMessage('Задачу оновлено.', 'success');
    }

    async function deleteTask(taskId) {
      await request(`/tasks/${taskId}`, { method: 'DELETE' });
      showMessage('Задачу видалено.', 'success');
    }

    async function createUser(payload) {
      await request('/users', {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      showMessage('Користувача створено.', 'success');
    }

    async function updateUser(userId, payload) {
      await request(`/users/${userId}`, {
        method: 'PATCH',
        body: JSON.stringify(payload),
      });
      showMessage('Користувача оновлено.', 'success');
    }

    async function deleteUser(userId) {
      await request(`/users/${userId}`, { method: 'DELETE' });
      showMessage('Користувача видалено.', 'success');
    }

    async function toggleTask(taskId) {
      const task = state.tasks.find(item => Number(item.id) === Number(taskId));
      if (!task) return;
      await updateTask(taskId, { completed: !Boolean(task.completed) });
    }

    function getTaskFormPayload() {
      const title = elements.taskTitleInput.value.trim();
      const description = elements.taskDescriptionInput.value.trim();
      const authorUserId = Number(elements.taskAuthorSelect.value);

      if (!title) {
        throw new Error('Title є обов’язковим.');
      }

      if (!authorUserId) {
        throw new Error('Потрібно обрати користувача.');
      }

      const payload = {
        title,
        author_user_id: authorUserId,
      };

      if (description) {
        payload.description = description;
      }

      return payload;
    }

    function getUserFormPayload() {
      const fullName = elements.userFullNameInput.value.trim();
      const phoneNumber = elements.userPhoneInput.value.trim();

      if (!fullName) {
        throw new Error('Full name є обов’язковим.');
      }

      const payload = { full_name: fullName };
      if (phoneNumber) {
        payload.phone_number = phoneNumber;
      }

      return payload;
    }

    async function handleTaskFormSubmit(event) {
      event.preventDefault();

      try {
        const payload = getTaskFormPayload();

        if (state.taskModalMode === 'create') {
          await createTask(payload);
        } else {
          await updateTask(state.editingTaskId, payload);
        }

        closeTaskModal();
        await loadTasks();
      } catch (error) {
        showMessage(getErrorText(error), 'error');
      }
    }

    async function handleUserFormSubmit(event) {
      event.preventDefault();

      try {
        const payload = getUserFormPayload();

        if (state.userModalMode === 'create') {
          await createUser(payload);
        } else {
          await updateUser(state.editingUserId, payload);
        }

        closeUserModal();
        await loadUsers();
      } catch (error) {
        showMessage(getErrorText(error), 'error');
      }
    }

    function handleApplyFilters() {
      state.taskFilters.userId = elements.taskUserFilter.value;
      state.taskFilters.limit = Number(elements.taskLimitFilter.value || 20);
      state.taskFilters.offset = Number(elements.taskOffsetFilter.value || 0);
      loadTasks().catch(error => showMessage(getErrorText(error), 'error'));
    }

    function handleUsersFiltersChange() {
      state.usersFilters.limit = Number(elements.usersLimitFilter.value || 20);
      state.usersFilters.offset = Number(elements.usersOffsetFilter.value || 0);
      loadUsers().catch(error => showMessage(getErrorText(error), 'error'));
    }

    function handleApplyStatisticsFilters() {
      state.statisticsFilters.userId = elements.statisticsUserFilter.value;
      state.statisticsFilters.from = elements.statisticsFromInput.value;
      state.statisticsFilters.to = elements.statisticsToInput.value;
      loadStatistics().catch(error => showMessage(getErrorText(error), 'error'));
    }

    async function handleTaskListClick(event) {
      const button = event.target.closest('button[data-action]');
      if (!button) return;

      const action = button.dataset.action;
      const taskId = Number(button.dataset.id);

      try {
        if (action === 'edit') {
          openEditTaskModal(taskId);
          return;
        }

        if (action === 'delete') {
          const confirmed = window.confirm('Видалити цю задачу?');
          if (!confirmed) return;
          await deleteTask(taskId);
          await loadTasks();
          return;
        }

        if (action === 'toggle') {
          await toggleTask(taskId);
          await loadTasks();
        }
      } catch (error) {
        showMessage(getErrorText(error), 'error');
      }
    }

    async function handleUsersListClick(event) {
      const button = event.target.closest('button[data-user-action]');
      if (!button) return;

      const action = button.dataset.userAction;
      const userId = Number(button.dataset.id);

      try {
        if (action === 'edit') {
          openEditUserModal(userId);
          return;
        }

        if (action === 'delete') {
          const confirmed = window.confirm('Видалити цього користувача?');
          if (!confirmed) return;
          await deleteUser(userId);
          await loadUsers();
          await loadTasks();
          await loadStatistics();
        }
      } catch (error) {
        showMessage(getErrorText(error), 'error');
      }
    }

    function initNavigation() {
      elements.navButtons.forEach(button => {
        button.addEventListener('click', () => {
          elements.navButtons.forEach(item => item.classList.remove('active'));
          elements.pages.forEach(page => page.classList.remove('active'));
          button.classList.add('active');
          document.getElementById(button.dataset.page).classList.add('active');
        });
      });
    }

    function bindEvents() {
      initNavigation();
      elements.applyTaskFiltersButton.addEventListener('click', handleApplyFilters);
      elements.applyStatisticsFiltersButton.addEventListener('click', handleApplyStatisticsFilters);
      elements.usersLimitFilter.addEventListener('change', handleUsersFiltersChange);
      elements.usersOffsetFilter.addEventListener('input', handleUsersFiltersChange);
      elements.openCreateTaskModalButton.addEventListener('click', openCreateTaskModal);
      elements.closeTaskModalButton.addEventListener('click', closeTaskModal);
      elements.cancelTaskModalButton.addEventListener('click', closeTaskModal);
      elements.taskForm.addEventListener('submit', handleTaskFormSubmit);
      elements.tasksList.addEventListener('click', handleTaskListClick);
      elements.openCreateUserModalButton.addEventListener('click', openCreateUserModal);
      elements.closeUserModalButton.addEventListener('click', closeUserModal);
      elements.cancelUserModalButton.addEventListener('click', closeUserModal);
      elements.userForm.addEventListener('submit', handleUserFormSubmit);
      elements.usersList.addEventListener('click', handleUsersListClick);
      elements.taskModal.addEventListener('click', (event) => {
        if (event.target === elements.taskModal) closeTaskModal();
      });
      elements.userModal.addEventListener('click', (event) => {
        if (event.target === elements.userModal) closeUserModal();
      });
    }

    async function init() {
      bindEvents();
      try {
        await loadUsers({ silent: true });
        await loadTasks();
        await loadStatistics();
      } catch (error) {
        showMessage(getErrorText(error), 'error');
      }
    }

    init();
  </script>
</body>
</html>
